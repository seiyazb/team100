            エンジニアのスキルシートの業務説明文を、採用担当者が読んで印象に残る文章に仕上げます。


            ルール：

            - 事実を誇張せず、あくまで「伝わりやすく」する

            - 数値がある場合は必ず使う（削減率、チーム規模、期間など）

            - 一文は70文字以内を目安にする

            - 受動態より能動態を使う

            ```


